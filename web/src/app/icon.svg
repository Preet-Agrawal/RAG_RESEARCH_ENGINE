<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a87b"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#fff4e0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Top edge lines (faint — what LLMs already attend to) -->
  <rect x="16" y="16" width="32" height="2" rx="1" fill="white" opacity="0.35"/>
  <rect x="20" y="21" width="24" height="2" rx="1" fill="white" opacity="0.25"/>

  <!-- Middle focus band (bright — what we recover) -->
  <rect x="10" y="28" width="44" height="8" rx="4" fill="url(#band)" filter="url(#glow)"/>

  <!-- Bottom edge lines (faint) -->
  <rect x="20" y="41" width="24" height="2" rx="1" fill="white" opacity="0.25"/>
  <rect x="16" y="46" width="32" height="2" rx="1" fill="white" opacity="0.35"/>
</svg>
