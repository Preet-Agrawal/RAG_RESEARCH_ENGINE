<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a87b"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#fff4e0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="90" cy="90" r="90" fill="url(#bg)"/>

  <rect x="45" y="45" width="90" height="6" rx="3" fill="white" opacity="0.35"/>
  <rect x="56" y="59" width="68" height="6" rx="3" fill="white" opacity="0.25"/>

  <rect x="28" y="79" width="124" height="22" rx="11" fill="url(#band)" filter="url(#glow)"/>

  <rect x="56" y="115" width="68" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="45" y="129" width="90" height="6" rx="3" fill="white" opacity="0.35"/>
</svg>
